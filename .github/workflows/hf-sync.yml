name: Sync to Hugging Face Space

# main에 푸시되면 자동으로 HF Space에 코드를 동기화합니다.
# 최초 1회, GitHub 저장소 Settings → Secrets and variables → Actions 에
# `HF_TOKEN` (Write 권한) 을 추가해야 동작합니다.
# 수동 실행도 가능 — Actions 탭에서 "Run workflow" 버튼으로 트리거.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub main
        uses: actions/checkout@v4
        with:
          path: gh
          fetch-depth: 1

      - name: Mirror files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: YongZa
          HF_SPACE: aibot-demo
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "::group::Clone HF Space repo"
          # "user" here is a placeholder — HF uses the token for auth, not the username segment.
          HF_URL="https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git clone "$HF_URL" hf
          echo "::endgroup::"

          echo "::group::Replace HF contents with GitHub main"
          # Remove everything tracked on HF except .git and .gitattributes (LFS config)
          cd hf
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.gitattributes' -exec rm -rf {} +
          cd ..
          # Copy everything from GitHub checkout except .git and .github (workflow stays on GH)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            gh/ hf/
          echo "::endgroup::"

          echo "::group::Commit and push"
          cd hf
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "Sync from GitHub main @ ${GITHUB_SHA::7}"
          git push origin HEAD:main
          echo "::endgroup::"
