name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "Products.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh products-data.json from Products.json
        run: |
          python3 -c "
          import json
          d = json.load(open('Products.json', encoding='utf-8'))
          open('web/products-data.json','w',encoding='utf-8').write(
              json.dumps(d.get('자사_제품', []), ensure_ascii=False, indent=2))
          "

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
