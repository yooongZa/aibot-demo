<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="chainlit-server" content="https://yongza-aibot-demo.hf.space" />
  <title>제품 라인업 — 뉴트리시파이</title>
  <link rel="stylesheet" href="./static/styles.css" />
  <style>
    .product-image {
      display: block;
      width: 96px;
      height: 96px;
      border-radius: 12px;
      margin: 0 0 14px;
      background: var(--bg);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="./index.html" class="logo" style="text-decoration:none">🌿 뉴트리시파이</a>
    <div class="nav-links">
      <a href="./index.html">홈</a>
      <a href="./about.html">서비스 소개</a>
      <a href="./demo.html">데모 시나리오</a>
      <a href="./products.html">제품 라인업</a>
    </div>
    <button class="nav-cta" onclick="openCopilot()">상담 시작</button>
  </div>
</nav>

<header class="hero">
  <div class="container">
    <span class="hero-badge">📦 전체 제품</span>
    <h1>뉴트리시파이 <span>제품 라인업</span></h1>
    <p>총 7종의 자사 건강기능식품. 상담을 통해 본인에게 맞는 제품을 찾아보세요.</p>
  </div>
</header>

<section>
  <div class="container">
    <div class="product-grid" id="product-list">
      <!-- products load here from products-data.json -->
    </div>
    <div style="text-align: center; margin-top: 40px;">
      <button class="hero-cta" onclick="openCopilot()">💬 맞춤 상담 받기</button>
    </div>
  </div>
</section>

<footer>
  <p><strong>🌿 뉴트리시파이 (Nutrify)</strong> — AI 기반 건강기능식품 맞춤 상담 (테스트 페이지)</p>
  <p>© 2026 Nutrify Demo · <a href="./index.html" style="color: var(--muted)">홈</a> · <a href="./about.html" style="color: var(--muted)">소개</a> · <a href="./demo.html" style="color: var(--muted)">데모</a></p>
</footer>

<script>
  // Slug + icon maps kept in sync with Products.json so chatbot deep links
  // (e.g. products.html#eye) scroll to the matching card.
  const PRODUCT_SLUGS = {
    "뉴트리시파이 데일리 베이스": "daily-base",
    "뉴트리시파이 오메가3 비타민D": "omega3",
    "뉴트리시파이 관절 토탈 케어": "joint",
    "뉴트리시파이 눈 스마트 포커스": "eye",
    "뉴트리시파이 에너지 부스트업": "energy",
    "뉴트리시파이 장 프로텍션": "gut",
    "뉴트리시파이 피부 글로우": "skin",
  };
  const PRODUCT_ICONS = {
    "뉴트리시파이 데일리 베이스": "💊",
    "뉴트리시파이 오메가3 비타민D": "🐟",
    "뉴트리시파이 관절 토탈 케어": "🦴",
    "뉴트리시파이 눈 스마트 포커스": "👁",
    "뉴트리시파이 에너지 부스트업": "⚡",
    "뉴트리시파이 장 프로텍션": "🌱",
    "뉴트리시파이 피부 글로우": "✨",
  };

  fetch("./products-data.json")
    .then((r) => r.json())
    .then((products) => {
      const list = document.getElementById("product-list");
      list.innerHTML = products.map((p) => {
        const name = p["제품명"];
        const slug = PRODUCT_SLUGS[name] || "";
        const icon = PRODUCT_ICONS[name] || "🌿";
        const img = slug ? `./static/images/products/${slug}.svg` : "";
        const tags = (p["연관_니즈"] || []).slice(0, 2).map((n) => `#${n}`).join(" · ");
        const ings = (p["주요_원료"] || []).slice(0, 4)
          .map((i) => `<li><strong>${i.이름}</strong> · ${i.함량 || ""}</li>`).join("");
        return `
          <div class="product" ${slug ? `id="${slug}"` : ""}>
            ${img ? `<img class="product-image" src="${img}" alt="${name}">` : ""}
            <span class="product-tag">${tags}</span>
            <h3><span style="margin-right:6px">${icon}</span>${name}</h3>
            <ul>${ings}</ul>
          </div>
        `;
      }).join("");

      if (location.hash) {
        const el = document.querySelector(location.hash);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
          el.style.outline = "2px solid var(--primary)";
          el.style.outlineOffset = "4px";
          setTimeout(() => { el.style.outline = ""; el.style.outlineOffset = ""; }, 2400);
        }
      }
    })
    .catch(() => {
      document.getElementById("product-list").innerHTML =
        '<p style="text-align:center; color: var(--muted);">제품 데이터를 불러오지 못했습니다.</p>';
    });
</script>
<script src="./static/copilot.js"></script>
</body>
</html>
